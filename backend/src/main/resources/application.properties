# Load local env file in backend/ (key=value format)
spring.config.import=optional:file:.env[.properties]

# ── Server ──
server.port=8080

# ── Supabase (from .env) ──
supabase.url=${SUPABASE_URL:}
supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:}
supabase.secret-key=${SUPABASE_SECRET_KEY:}

# JWT Configration
JwtSecret=${JWT_SECRETKEY}
JwtExpirationMs=86400000

# ── H2 In-Memory Database ──
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.pkcsfpmyyzilmeolygor
spring.datasource.password=AR8S8uPXZ7LVx1VT
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# ── H2 Console (http://localhost:8080/h2-console) ──
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

spring.devtools.restart.enabled=true
logging.level.org.jooq.tools.LoggerListener=DEBUG
logging.level.org.jooq=DEBUG
